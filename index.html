<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sukoon — Internal Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brass:#B08D57;--brass-light:#C9A96E;--brass-dark:#8A6D3F;
  --teal:#3D5148;--teal-light:#4E6659;--teal-dark:#2C3C35;
  --teal-faint:rgba(61,81,72,0.18);--teal-faint2:rgba(61,81,72,0.28);
  --sand:#D6C6AE;--sand-light:#EDE3D4;--sand-dark:#C4B095;
  --bg:#181614;--bg-2:#1F1C18;--bg-3:#272320;--surface:#2E2A26;--surface-2:#373228;
  --text-1:#EDE3D4;--text-2:#C4B095;--text-3:#8A7D6A;--text-4:#574E43;
  --border:rgba(176,141,87,0.13);--border-2:rgba(176,141,87,0.24);--border-teal:rgba(61,81,72,0.5);
  --radius:8px;--radius-lg:12px;
  --font-display:'Cormorant Garamond',serif;--font-body:'DM Sans',sans-serif;
}
html,body{height:100%;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text-1);display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:224px;flex-shrink:0;background:var(--bg-2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto;box-shadow:inset -1px 0 0 rgba(61,81,72,0.3);}
.sidebar-brand{padding:20px 18px 16px;border-bottom:0.5px solid var(--border);background:linear-gradient(135deg,rgba(61,81,72,0.15),transparent);}
.brand-mark{display:flex;align-items:center;gap:10px;}
.brand-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--teal),var(--brass-dark));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--sand-light);}
.brand-name{font-family:var(--font-display);font-size:19px;font-weight:600;color:var(--sand);letter-spacing:0.04em;}
.brand-sub{font-size:10px;color:var(--text-3);margin-top:1px;letter-spacing:0.06em;text-transform:uppercase;}
.nav-section{font-size:9px;font-weight:500;color:var(--text-4);text-transform:uppercase;letter-spacing:0.1em;padding:16px 18px 6px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;margin:1px 8px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text-3);transition:all 0.14s;user-select:none;}
.nav-item:hover{background:var(--teal-faint);color:var(--text-2);}
.nav-item.active{background:var(--teal-faint2);color:#8FC4A8;font-weight:500;border:0.5px solid var(--border-teal);}
.nav-icon{width:15px;height:15px;opacity:0.65;flex-shrink:0;}
.nav-item.active .nav-icon{opacity:1;}
.nav-badge{margin-left:auto;background:var(--teal-faint2);color:#8FC4A8;font-size:10px;padding:1px 6px;border-radius:10px;}
.sidebar-footer{margin-top:auto;padding:14px 18px;border-top:0.5px solid var(--border-teal);display:flex;align-items:center;gap:9px;background:var(--teal-faint);}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--sand);flex-shrink:0;}
.user-name{font-size:12px;color:var(--text-2);}
.user-role{font-size:10px;color:var(--text-4);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;border-bottom:0.5px solid var(--border-teal);background:linear-gradient(90deg,rgba(61,81,72,0.12),var(--bg-2) 40%);flex-shrink:0;}
.topbar-title{font-family:var(--font-display);font-size:21px;font-weight:500;color:var(--sand);letter-spacing:0.02em;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.date-chip{font-size:11px;color:var(--text-3);background:var(--teal-faint);border:0.5px solid var(--border-teal);border-radius:20px;padding:4px 12px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#5C9E7A;transition:background 0.3s;flex-shrink:0;}
.sync-dot.syncing{background:var(--brass);animation:pulse 1s infinite;}
.sync-dot.error{background:#C0704A;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.content{flex:1;overflow-y:auto;padding:24px;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text-3);font-size:13px;}
.spinner{width:28px;height:28px;border:2px solid var(--border-teal);border-top-color:#8FC4A8;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* SHARED */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
.metric{background:var(--bg-3);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;}
.metric.ta{border-color:var(--border-teal);background:linear-gradient(135deg,rgba(61,81,72,0.14),var(--bg-3));}
.metric-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;}
.metric-value{font-family:var(--font-display);font-size:28px;font-weight:500;color:var(--sand);line-height:1;}
.metric-sub{font-size:11px;color:var(--text-4);margin-top:4px;}
.metric-sub.good{color:#5C9E7A;} .metric-sub.warn{color:#C0704A;}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.st{font-family:var(--font-display);font-size:16px;font-weight:500;color:var(--sand);letter-spacing:0.02em;}
.btn-add{display:flex;align-items:center;gap:5px;font-size:12px;font-family:var(--font-body);color:#8FC4A8;background:var(--teal-faint);border:0.5px solid var(--border-teal);border-radius:var(--radius);padding:5px 12px;cursor:pointer;transition:all 0.12s;}
.btn-add:hover{background:var(--teal-faint2);}
.card{background:var(--bg-3);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px;}
.add-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;animation:sd 0.15s ease;}
@keyframes sd{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
.add-row input,.add-row select{font-size:13px;font-family:var(--font-body);padding:8px 12px;border:0.5px solid var(--border-teal);border-radius:var(--radius);background:var(--surface);color:var(--text-1);outline:none;}
.add-row input{flex:1;min-width:120px;}
.add-row input:focus{border-color:var(--teal-light);}
.add-row select{color:var(--text-2);cursor:pointer;}
.add-row input[type=date]{color:var(--text-2);cursor:pointer;width:150px;flex:none;}
.add-row input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5);}
.btn-p{font-size:12px;font-family:var(--font-body);padding:8px 16px;background:var(--teal);color:var(--sand);border:none;border-radius:var(--radius);cursor:pointer;font-weight:500;transition:background 0.12s;}
.btn-p:hover{background:var(--teal-light);}
.btn-g{font-size:12px;font-family:var(--font-body);padding:8px 12px;background:none;color:var(--text-3);border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.12s;}
.btn-g:hover{background:var(--surface);color:var(--text-2);}
.btn-x{background:none;border:none;color:var(--text-4);cursor:pointer;padding:3px 6px;border-radius:4px;font-size:13px;line-height:1;transition:all 0.12s;flex-shrink:0;}
.btn-x:hover{color:#C0704A;background:rgba(192,112,74,0.12);}
.prog-bar{height:4px;background:var(--surface-2);border-radius:10px;margin:8px 0 4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:10px;background:var(--teal-light);transition:width 0.4s ease;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.mini-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:12px;color:var(--text-3);}
.mini-row:last-child{border-bottom:none;}
.empty{font-size:12px;color:var(--text-4);padding:12px 0;text-align:center;}

/* TASKS */
.task-list{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg-3);transition:border-color 0.12s,background 0.12s;}
.task-item:hover{border-color:var(--border-teal);background:var(--surface);}
.task-item.done{opacity:0.38;}
.task-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--teal-light);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.12s;cursor:pointer;}
.task-item.done .task-check{background:var(--teal);border-color:var(--teal);}
.chk-svg{width:9px;height:9px;stroke:var(--sand);fill:none;stroke-width:2.2;}
.task-body{flex:1;min-width:0;cursor:pointer;}
.task-name{font-size:13px;color:var(--text-1);line-height:1.45;}
.task-item.done .task-name{text-decoration:line-through;color:var(--text-4);}
.task-meta{display:flex;align-items:center;gap:8px;margin-top:5px;}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;}
.tag-product{background:rgba(61,81,72,0.35);color:#8FC4A8;border:0.5px solid rgba(61,81,72,0.6);}
.tag-growth{background:rgba(176,141,87,0.15);color:var(--brass-light);border:0.5px solid rgba(176,141,87,0.3);}
.tag-ops{background:rgba(153,107,72,0.2);color:#D4A07A;border:0.5px solid rgba(153,107,72,0.4);}
.tag-eng{background:rgba(45,70,80,0.35);color:#7AB8CC;border:0.5px solid rgba(45,70,80,0.6);}
.tag-finance{background:rgba(120,100,60,0.2);color:#C8B080;border:0.5px solid rgba(120,100,60,0.4);}
.due-label{font-size:11px;color:var(--text-4);}
.due-today{color:var(--brass-light);}
.due-over{color:#C0704A;}
.prio-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.p-high{background:#C0704A;}.p-mid{background:var(--brass);}.p-low{background:var(--teal-light);}
.comp-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 2px;color:var(--text-3);font-size:12px;user-select:none;border-top:0.5px solid var(--border);margin-bottom:6px;}
.comp-toggle:hover{color:var(--text-2);}

/* OKR */
.okr-list{display:flex;flex-direction:column;gap:14px;margin-bottom:20px;}
.okr-card{background:var(--bg-3);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;transition:border-color 0.12s;}
.okr-card:hover{border-color:var(--border-teal);}
.okr-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;gap:10px;}
.okr-title{font-family:var(--font-display);font-size:15px;font-weight:500;color:var(--sand);flex:1;}
.okr-pct{font-family:var(--font-display);font-size:20px;font-weight:500;color:#8FC4A8;}
.okr-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.term-pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;}
.term-short{background:rgba(176,141,87,0.15);color:var(--brass-light);border:0.5px solid rgba(176,141,87,0.3);}
.term-medium{background:rgba(61,81,72,0.3);color:#8FC4A8;border:0.5px solid rgba(61,81,72,0.5);}
.term-long{background:rgba(45,70,80,0.35);color:#7AB8CC;border:0.5px solid rgba(45,70,80,0.6);}
.dl-chip{font-size:10px;color:var(--text-4);}
.kr-list{display:flex;flex-direction:column;gap:9px;margin-top:4px;}
.kr-row{display:flex;align-items:center;gap:10px;}
.kr-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--teal-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.12s;}
.kr-check.checked{background:var(--teal);border-color:var(--teal);}
.kr-chk-svg{width:8px;height:8px;stroke:var(--sand);fill:none;stroke-width:2.2;}
.kr-body{flex:1;min-width:0;}
.kr-lr{display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);margin-bottom:4px;}
.kr-lr span:last-child{color:var(--text-4);font-size:11px;}
.kr-bar{height:3px;background:var(--surface-2);border-radius:10px;overflow:hidden;}
.kr-fill{height:100%;border-radius:10px;transition:width 0.4s;}
.kr-fill.on-track{background:#5C9E7A;}.kr-fill.at-risk{background:var(--brass);}.kr-fill.behind{background:#C0704A;}
.kr-row.done-kr .kr-body{opacity:0.38;}
.kr-row.done-kr .kr-lr span:first-child{text-decoration:line-through;}
.okr-add-kr{margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;}
.okr-add-kr input,.okr-add-kr select{font-size:12px;font-family:var(--font-body);padding:6px 10px;border:0.5px solid var(--border-teal);border-radius:var(--radius);background:var(--surface);color:var(--text-1);outline:none;}
.okr-add-kr input{flex:1;min-width:100px;}
.btn-sm{font-size:11px;font-family:var(--font-body);padding:6px 12px;background:var(--teal-faint2);color:#8FC4A8;border:0.5px solid var(--border-teal);border-radius:var(--radius);cursor:pointer;white-space:nowrap;}
.btn-sm:hover{background:var(--teal-faint);}

/* BUDGET */
.bud-hdr{display:flex;align-items:center;gap:20px;padding:16px 20px;margin-bottom:16px;background:linear-gradient(135deg,rgba(61,81,72,0.2),var(--bg-3));border:0.5px solid var(--border-teal);border-radius:var(--radius-lg);flex-wrap:wrap;}
.bud-lbl{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;}
.bud-input{font-family:var(--font-display);font-size:22px;background:none;border:none;border-bottom:1px solid var(--border-teal);color:var(--sand);outline:none;width:200px;padding:2px 4px;}
.bud-input:focus{border-bottom-color:var(--teal-light);}
.cat-section{margin-bottom:16px;}
.cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--teal-faint);border-radius:var(--radius) var(--radius) 0 0;border:0.5px solid var(--border-teal);}
.cat-name{font-size:12px;font-weight:500;color:#8FC4A8;}
.cat-total{font-size:12px;color:var(--text-3);}
.bud-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border:0.5px solid var(--border);border-top:none;background:var(--bg-3);}
.bud-item:last-child{border-radius:0 0 var(--radius) var(--radius);}
.b-name{flex:1;color:var(--text-1);font-size:13px;}
.b-note{font-size:11px;color:var(--text-4);}
.b-amt{font-family:var(--font-display);font-size:15px;color:var(--sand);white-space:nowrap;}
.alloc-bar{height:3px;background:var(--surface-2);border-radius:10px;margin-top:3px;overflow:hidden;}
.alloc-fill{height:100%;border-radius:10px;background:var(--teal-light);}

/* CRM */
.contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:20px;}
.contact-card{background:var(--bg-3);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;transition:border-color 0.12s;position:relative;}
.contact-card:hover{border-color:var(--border-teal);}
.c-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.c-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:14px;font-weight:500;flex-shrink:0;}
.c-name{font-size:14px;font-weight:500;color:var(--text-1);}
.c-role{font-size:11px;color:var(--text-3);margin-top:1px;}
.c-details{display:flex;flex-direction:column;gap:5px;}
.c-dr{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-3);}
.status-pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;margin-top:8px;}
.s-lead{background:rgba(176,141,87,0.15);color:var(--brass-light);border:0.5px solid rgba(176,141,87,0.3);}
.s-partner{background:rgba(61,81,72,0.35);color:#8FC4A8;border:0.5px solid rgba(61,81,72,0.55);}
.s-investor{background:rgba(45,70,80,0.35);color:#7AB8CC;border:0.5px solid rgba(45,70,80,0.6);}
.s-vendor{background:rgba(153,107,72,0.2);color:#D4A07A;border:0.5px solid rgba(153,107,72,0.4);}
.s-customer{background:rgba(92,80,50,0.25);color:#C8B080;border:0.5px solid rgba(120,100,60,0.4);}
.card-del{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text-4);cursor:pointer;font-size:14px;padding:3px 6px;border-radius:4px;transition:all 0.12s;line-height:1;}
.card-del:hover{color:#C0704A;background:rgba(192,112,74,0.12);}

/* LOCATIONS */
.loc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:20px;}
.loc-card{background:var(--bg-3);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;transition:border-color 0.12s;}
.loc-card:hover{border-color:var(--border-teal);}
.loc-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;}
.loc-name{font-family:var(--font-display);font-size:15px;font-weight:500;color:var(--sand);flex:1;}
.loc-card-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.loc-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap;}
.loc-shortlisted{background:rgba(61,81,72,0.35);color:#8FC4A8;border:0.5px solid rgba(61,81,72,0.6);}
.loc-viewing{background:rgba(176,141,87,0.18);color:var(--brass-light);border:0.5px solid rgba(176,141,87,0.35);}
.loc-rejected{background:rgba(192,112,74,0.18);color:#D4947A;border:0.5px solid rgba(192,112,74,0.35);}
.loc-considering{background:rgba(45,70,80,0.35);color:#7AB8CC;border:0.5px solid rgba(45,70,80,0.6);}
.loc-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.loc-stat{background:var(--surface);border-radius:var(--radius);padding:8px 10px;}
.loc-stat-lbl{font-size:9px;color:var(--text-4);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px;}
.loc-stat-val{font-family:var(--font-display);font-size:14px;color:var(--sand);}
.loc-total{background:linear-gradient(135deg,rgba(61,81,72,0.2),var(--surface));border:0.5px solid var(--border-teal);border-radius:var(--radius);padding:8px 10px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.loc-total-lbl{font-size:10px;color:#8FC4A8;text-transform:uppercase;letter-spacing:0.06em;}
.loc-total-val{font-family:var(--font-display);font-size:18px;color:var(--sand);}
.loc-stars{display:flex;gap:3px;margin-bottom:8px;}
.star{font-size:14px;color:var(--text-4);line-height:1;}
.star.filled{color:var(--brass-light);}
.loc-notes{font-size:11px;color:var(--text-3);line-height:1.55;margin-bottom:10px;white-space:pre-wrap;}
.loc-pc{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.loc-pc-box{background:var(--surface);border-radius:var(--radius);padding:8px 10px;}
.loc-pc-lbl{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;}
.loc-pc-lbl.pro{color:#5C9E7A;}.loc-pc-lbl.con{color:#C0704A;}
.loc-pc-text{font-size:11px;color:var(--text-3);line-height:1.5;white-space:pre-wrap;}
.loc-act-btn{font-size:11px;font-family:var(--font-body);padding:4px 10px;background:none;border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text-3);cursor:pointer;transition:all 0.12s;}
.loc-act-btn:hover{background:var(--teal-faint);color:#8FC4A8;border-color:var(--border-teal);}
.cmp-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px;}
.cmp-table th{text-align:left;padding:8px 12px;background:var(--teal-faint);color:#8FC4A8;font-size:10px;text-transform:uppercase;letter-spacing:0.07em;font-weight:500;border:0.5px solid var(--border-teal);}
.cmp-table td{padding:9px 12px;border:0.5px solid var(--border);color:var(--text-2);vertical-align:top;}
.cmp-table tr:nth-child(even) td{background:var(--bg-3);}
.cmp-table tr:nth-child(odd) td{background:var(--bg-2);}
.cmp-table td:first-child{font-weight:500;color:var(--text-1);}
.view-btns{display:flex;gap:6px;}
.view-btn{font-size:11px;font-family:var(--font-body);padding:4px 10px;background:none;border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text-3);cursor:pointer;transition:all 0.12s;}
.view-btn.active{background:var(--teal-faint2);color:#8FC4A8;border-color:var(--border-teal);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg-2);border:0.5px solid var(--border-teal);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:var(--font-display);font-size:18px;font-weight:500;color:var(--sand);margin-bottom:18px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.mf{display:flex;flex-direction:column;gap:5px;}
.mf.full{grid-column:1/-1;}
.ml{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.07em;}
.mi{font-size:13px;font-family:var(--font-body);padding:8px 12px;border:0.5px solid var(--border-teal);border-radius:var(--radius);background:var(--surface);color:var(--text-1);outline:none;width:100%;}
.mi:focus{border-color:var(--teal-light);}
.mt{font-size:12px;font-family:var(--font-body);padding:8px 12px;border:0.5px solid var(--border-teal);border-radius:var(--radius);background:var(--surface);color:var(--text-1);outline:none;width:100%;resize:vertical;min-height:60px;line-height:1.5;}
.mt:focus{border-color:var(--teal-light);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.vat-row{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:0.5px solid var(--border-teal);}
.vat-btn{font-size:11px;font-family:var(--font-body);padding:3px 12px;border-radius:20px;border:0.5px solid var(--border-teal);background:none;color:var(--text-3);cursor:pointer;transition:all 0.12s;}
.vat-btn.on{background:rgba(61,81,72,0.2);color:#8FC4A8;border-color:rgba(61,81,72,0.6);}

/* HOME */
.home-greeting{font-family:var(--font-display);font-size:32px;font-weight:500;color:var(--sand);margin-bottom:4px;letter-spacing:0.02em;}
.home-sub{font-size:13px;color:var(--text-3);margin-bottom:24px;}
.home-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px;}
.hnc{background:var(--bg-3);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px;cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;gap:6px;}
.hnc:hover{border-color:var(--border-teal);background:var(--surface);}
.hnc-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:2px;}
.hnc-title{font-family:var(--font-display);font-size:16px;font-weight:500;color:var(--sand);}
.hnc-desc{font-size:12px;color:var(--text-3);line-height:1.5;}
.hnc-count{font-size:11px;color:#8FC4A8;margin-top:2px;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:10px;}

const tC={short:'term-short',medium:'term-medium',long:'term-long'};

// ── LOAD ──
async function loadAll(){
  const el=document.getElementById('content');
  try{
    el.innerHTML='<div class="loading-screen"><div class="spinner"></div><span>Connecting to Sukoon...</span></div>';
    const [t,o,kr,b,bi,c,loc]=await Promise.all([
      sb.from('tasks').select('*').order('created_at'),
      sb.from('okrs').select('*').order('created_at'),
      sb.from('key_results').select('*').order('created_at'),
      sb.from('budget').select('*').limit(1),
      sb.from('budget_items').select('*').order('created_at'),
      sb.from('contacts').select('*').order('created_at'),
      sb.from('locations').select('*').order('created_at'),
    ]);
    if(t.error)throw new Error('tasks: '+t.error.message);
    if(o.error)throw new Error('okrs: '+o.error.message);
    if(kr.error)throw new Error('key_results: '+kr.error.message);
    if(b.error)throw new Error('budget: '+b.error.message);
    if(bi.error)throw new Error('budget_items: '+bi.error.message);
    if(c.error)throw new Error('contacts: '+c.error.message);
    if(loc.error)throw new Error('locations: '+loc.error.message);
    tasks=t.data||[];
    okrs=o.data||[];
    krMap={};(kr.data||[]).forEach(k=>{if(!krMap[k.okr_id])krMap[k.okr_id]=[];krMap[k.okr_id].push(k);});
    const br=b.data&&b.data.length?b.data[0]:null;
    budgetRowId=br?br.id:null; budgetTotal=br?br.total_budget:0;
    budgetItems=bi.data||[];
    contacts=c.data||[];
    locations=loc.data||[];
    render();
  }catch(e){
    setSyncing('error');
    el.innerHTML='<div class="loading-screen"><div style="text-align:center;"><div style="color:#C0704A;font-size:15px;margin-bottom:10px;">Failed to connect</div><div style="color:var(--text-3);font-size:12px;background:var(--surface);padding:10px 14px;border-radius:8px;font-family:monospace;">'+esc(e.message)+'</div></div></div>';
  }
}

function subscribeRealtime(){
  sb.channel('sukoon')
    .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},()=>reload('tasks'))
    .on('postgres_changes',{event:'*',schema:'public',table:'okrs'},()=>reload('okrs'))
    .on('postgres_changes',{event:'*',schema:'public',table:'key_results'},()=>reload('krs'))
    .on('postgres_changes',{event:'*',schema:'public',table:'budget'},()=>reload('budget'))
    .on('postgres_changes',{event:'*',schema:'public',table:'budget_items'},()=>reload('bi'))
    .on('postgres_changes',{event:'*',schema:'public',table:'contacts'},()=>reload('contacts'))
    .on('postgres_changes',{event:'*',schema:'public',table:'locations'},()=>reload('locations'))
    .subscribe();
}

async function reload(t){
  if(t==='tasks'){const{data}=await sb.from('tasks').select('*').order('created_at');tasks=data||[];}
  else if(t==='okrs'){const{data}=await sb.from('okrs').select('*').order('created_at');okrs=data||[];}
  else if(t==='krs'){const{data}=await sb.from('key_results').select('*').order('created_at');krMap={};(data||[]).forEach(k=>{if(!krMap[k.okr_id])krMap[k.okr_id]=[];krMap[k.okr_id].push(k);});}
  else if(t==='budget'){const{data}=await sb.from('budget').select('*').limit(1);const br=data&&data.length?data[0]:null;budgetRowId=br?br.id:null;budgetTotal=br?br.total_budget:0;}
  else if(t==='bi'){const{data}=await sb.from('budget_items').select('*').order('created_at');budgetItems=data||[];}
  else if(t==='contacts'){const{data}=await sb.from('contacts').select('*').order('created_at');contacts=data||[];}
  else if(t==='locations'){const{data}=await sb.from('locations').select('*').order('created_at');locations=data||[];}
  render();
}

// ── NAV ──
function nav(p,el){
  page=p;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el)el.classList.add('active');
  document.getElementById('page-title').textContent=pT[p];
  render();
}

function render(){
  const nb=document.getElementById('nb-tasks');
  if(nb)nb.textContent=tasks.filter(t=>!t.done).length;
  const c=document.getElementById('content');
  if(page==='home')c.innerHTML=rHome();
  else if(page==='tasks')c.innerHTML=rTasks();
  else if(page==='okr')c.innerHTML=rOKR();
  else if(page==='budget')c.innerHTML=rBudget();
  else if(page==='crm')c.innerHTML=rCRM();
  else if(page==='locations')c.innerHTML=rLocations();
}

function tog(id){
  const el=document.getElementById(id);if(!el)return;
  const o=el.style.display!=='none';
  el.style.display=o?'none':'block';
  if(!o){const i=el.querySelector('input');if(i)i.focus();}
}

// ── HOME ──
function rHome(){
  const hr=new Date().getHours();
  const gr=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  const td=today();
  const pending=tasks.filter(t=>!t.done).length;
  const todayT=tasks.filter(t=>!t.done&&t.due===td).length;
  const alloc=budgetItems.reduce((a,b)=>a+b.amount,0);
  const rem=budgetTotal-alloc;
  const avgOkr=okrs.length?Math.round(okrs.map(o=>{const k=krMap[o.id]||[];if(!k.length)return 0;return Math.round(k.reduce((a,k)=>a+Math.min(100,Math.round(k.current_val/k.target_val*100)),0)/k.length);}).reduce((a,b)=>a+b,0)/okrs.length):0;
  const ni=document.querySelectorAll('.nav-item');
  return '<div class="home-greeting">'+gr+', founders.</div>'+
    '<div class="home-sub">Here\'s where Sukoon stands today.</div>'+
    '<div class="metrics">'+
    '<div class="metric ta"><div class="metric-label">Open tasks</div><div class="metric-value">'+pending+'</div><div class="metric-sub'+(todayT>0?' warn':'')+'">'+todayT+' due today</div></div>'+
    '<div class="metric ta"><div class="metric-label">OKR progress</div><div class="metric-value">'+avgOkr+'%</div><div class="metric-sub good">'+okrs.length+' objectives</div></div>'+
    '<div class="metric ta"><div class="metric-label">Budget remaining</div><div class="metric-value">&#8369;'+fmt(rem)+'</div><div class="metric-sub">of &#8369;'+fmt(budgetTotal)+'</div></div>'+
    '<div class="metric ta"><div class="metric-label">Contacts</div><div class="metric-value">'+contacts.length+'</div><div class="metric-sub">'+contacts.filter(c=>c.status==='lead').length+' leads</div></div>'+
    '</div>'+
    '<div class="home-cards">'+
    '<div class="hnc" onclick="nav(\'tasks\',document.querySelectorAll(\'.nav-item\')[1])"><div class="hnc-icon" style="background:rgba(61,81,72,0.3);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#8FC4A8" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 8l2 2 4-4"/></svg></div><div class="hnc-title">Task Manager</div><div class="hnc-desc">Track everything your startup needs to get done.</div><div class="hnc-count">'+pending+' open tasks</div></div>'+
    '<div class="hnc" onclick="nav(\'okr\',document.querySelectorAll(\'.nav-item\')[2])"><div class="hnc-icon" style="background:rgba(61,81,72,0.2);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#8FC4A8" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><circle cx="8" cy="8" r="3"/><circle cx="8" cy="8" r="1" fill="#8FC4A8"/></svg></div><div class="hnc-title">Goals & OKRs</div><div class="hnc-desc">Set short, medium, and long-term objectives.</div><div class="hnc-count">'+okrs.length+' objectives &middot; '+avgOkr+'% avg</div></div>'+
    '<div class="hnc" onclick="nav(\'budget\',document.querySelectorAll(\'.nav-item\')[3])"><div class="hnc-icon" style="background:rgba(61,81,72,0.2);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#8FC4A8" stroke-width="1.5"><path d="M2 4h12v8H2z"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1"/><path d="M8 8v.01"/></svg></div><div class="hnc-title">Budget Planner</div><div class="hnc-desc">Allocate your budget across categories and items.</div><div class="hnc-count">&#8369;'+fmt(rem)+' remaining</div></div>'+
    '<div class="hnc" onclick="nav(\'crm\',document.querySelectorAll(\'.nav-item\')[4])"><div class="hnc-icon" style="background:rgba(61,81,72,0.2);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#8FC4A8" stroke-width="1.5"><circle cx="6" cy="5" r="2.5"/><path d="M2 13c0-2.2 1.8-4 4-4s4 1.8 4 4"/><circle cx="12" cy="5" r="2"/><path d="M12 9c1.7 0 3 1.3 3 3"/></svg></div><div class="hnc-title">Contacts & CRM</div><div class="hnc-desc">Track investors, partners, customers and leads.</div><div class="hnc-count">'+contacts.length+' contacts</div></div>'+
    '<div class="hnc" onclick="nav(\'locations\',document.querySelectorAll(\'.nav-item\')[5])"><div class="hnc-icon" style="background:rgba(61,81,72,0.2);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#8FC4A8" stroke-width="1.5"><path d="M8 1.5C5.5 1.5 3.5 3.5 3.5 6c0 3.5 4.5 8.5 4.5 8.5s4.5-5 4.5-8.5c0-2.5-2-4.5-4.5-4.5z"/><circle cx="8" cy="6" r="1.5"/></svg></div><div class="hnc-title">Space Scouting</div><div class="hnc-desc">Compare retail locations, track pricing, and shortlist top spots.</div><div class="hnc-count">'+locations.length+' locations tracked</div></div>'+

// ── TASKS ──
function dueBadge(due){
  if(!due)return '<span class="due-label">No date</span>';
  const td=today();
  const label=fmtDate(due)||due;
  if(due===td)return '<span class="due-label due-today">Today &middot; '+label+'</span>';
  if(due<td)return '<span class="due-label due-over">Overdue &middot; '+label+'</span>';
  return '<span class="due-label">'+label+'</span>';
}

function taskRow(t){
  return '<div class="task-item'+(t.done?' done':'')+'">'+
    '<div class="task-check" onclick="doToggleTask(\''+t.id+'\','+(t.done?'false':'true')+')">'+
    (t.done?'<svg class="chk-svg" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>':'')+
    '</div>'+
    '<div class="task-body" onclick="doToggleTask(\''+t.id+'\','+(t.done?'false':'true')+')">'+
    '<div class="task-name">'+esc(t.name)+'</div>'+
    '<div class="task-meta"><span class="tag tag-'+t.tag+'">'+(tagL[t.tag]||t.tag)+'</span>'+dueBadge(t.due)+'</div>'+
    '</div>'+
    '<div class="prio-dot p-'+t.priority+'"></div>'+
    '<button class="btn-x" onclick="doDeleteTask(\''+t.id+'\')">&#x2715;</button>'+
    '</div>';
}

function rTasks(){
  const total=tasks.length,done=tasks.filter(t=>t.done).length;
  const pct=total?Math.round(done/total*100):0;
  const high=tasks.filter(t=>t.priority==='high'&&!t.done).length;
  const td=today();
  const active=tasks.filter(t=>!t.done).sort((a,b)=>{if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;return a.due<b.due?-1:a.due>b.due?1:0;});
  const completed=tasks.filter(t=>t.done);
  const todayCount=active.filter(t=>t.due===td).length;
  const areas=['product','growth','ops','eng','finance'];
  const aN={product:'Product',growth:'Growth',ops:'Operations',eng:'Engineering',finance:'Finance'};
  const aC={product:'#5C9E7A',growth:'#B08D57',ops:'#C0704A',eng:'#5A8FA0',finance:'#A89060'};

async function doAddTask(){

  const okrHTML=okrs.map(o=>{
    const krs=krMap[o.id]||[];
    const pct=krs.length?Math.round(krs.reduce((a,k)=>a+Math.min(100,Math.round(k.current_val/k.target_val*100)),0)/krs.length):0;

      '<div class="kr-list">'+
      (krs.map(k=>{const kp=Math.min(100,Math.round(k.current_val/k.target_val*100));return'<div class="kr-row'+(k.done?' done-kr':'')+'">'+

      '</div>'+
      '<div class="okr-add-kr">'+

      '<input type="number" autocomplete="off" placeholder="Current" id="kc-'+o.id+'" style="width:90px;" />'+
      '<input type="number" autocomplete="off" placeholder="Target" id="kt-'+o.id+'" style="width:90px;" />'+
      '<select id="ks-'+o.id+'"><option value="on-track">On track</option><option value="at-risk">At risk</option><option value="behind">Behind</option></select>'+
      '<button class="btn-sm" onclick="doAddKR(\''+o.id+'\')">+ Key result</button>'+

    '<div class="metric ta"><div class="metric-label">Key results</div><div class="metric-value">'+doneKrs+' / '+allKrs.length+'</div><div class="metric-sub good">completed</div></div>'+
    '<div class="metric ta"><div class="metric-label">Avg progress</div><div class="metric-value">'+avgPct+'%</div></div>'+
    '</div>'+
    '<div class="sh"><span class="st">Objectives</span><button class="btn-add" onclick="tog(\'o-add\')">+ Add objective</button></div>'+
    '<div id="o-add" style="display:none;"><div class="add-row">'+
    '<input type="text" autocomplete="off" id="o-name" placeholder="Objective name..." style="flex:2;" />'+
    '<select id="o-term"><option value="short">Short-term</option><option value="medium">Medium-term</option><option value="long">Long-term</option></select>'+
    '<input type="date" id="o-dl" autocomplete="off" style="width:150px;flex:none;" />'+
    '<button class="btn-p" onclick="doAddOKR()">Add</button><button class="btn-g" onclick="tog(\'o-add\')">Cancel</button>'+
    '</div></div>'+
    '<div class="okr-list">'+okrHTML+'</div>'+

function rBudget(){

  const cats=[...new Set(budgetItems.map(b=>b.category))];
  const catsHTML=cats.map(cat=>{
    const items=budgetItems.filter(b=>b.category===cat);
    const ct=items.reduce((a,b)=>a+b.amount,0);
    const cp=budgetTotal?Math.round(ct/budgetTotal*100):0;
    return '<div class="cat-section">'+
      '<div class="cat-hdr"><span class="cat-name">'+esc(cat)+'</span><span class="cat-total">&#8369;'+fmt(ct)+' &middot; '+cp+'% of budget</span></div>'+
      items.map(b=>'<div class="bud-item"><div style="flex:1;"><div class="b-name">'+esc(b.name)+'</div>'+(b.note?'<div class="b-note">'+esc(b.note)+'</div>':'')+

  }).join('')||'<div class="empty" style="padding:24px 0;">No items yet.</div>';
  return '<div class="bud-hdr">'+
    '<div style="flex:1;"><div class="bud-lbl">Total budget</div><input class="bud-input" type="number" autocomplete="off" value="'+budgetTotal+'" onchange="doSetBudget(this.value)" /></div>'+
    '<div style="text-align:right;"><div class="bud-lbl">Allocated</div><div style="font-family:var(--font-display);font-size:20px;color:#8FC4A8;">&#8369;'+fmt(alloc)+'</div></div>'+
    '<div style="text-align:right;"><div class="bud-lbl">Remaining</div><div style="font-family:var(--font-display);font-size:20px;color:'+(rem<0?'#C0704A':'var(--sand)')+';">&#8369;'+fmt(rem)+'</div></div></div>'+
    '<div class="metrics" style="grid-template-columns:repeat(3,1fr);margin-bottom:12px;">'+
    '<div class="metric ta"><div class="metric-label">Total budget</div><div class="metric-value">&#8369;'+fmt(budgetTotal)+'</div></div>'+
    '<div class="metric ta"><div class="metric-label">Allocated</div><div class="metric-value">&#8369;'+fmt(alloc)+'</div><div class="metric-sub">'+pct+'% used</div></div>'+
    '<div class="metric ta"><div class="metric-label">Remaining</div><div class="metric-value" style="color:'+(rem<0?'#C0704A':'var(--sand)')+';">&#8369;'+fmt(rem)+'</div><div class="metric-sub'+(rem<0?' warn':' good')+'">'+(rem<0?'Over budget':'Available')+'</div></div></div>'+
    '<div class="prog-bar" style="height:6px;margin-bottom:4px;"><div class="prog-fill" style="width:'+pct+'%;background:'+(pct>=100?'#C0704A':'var(--teal-light)')+'"></div></div>'+
    '<div style="font-size:11px;color:var(--text-4);margin-bottom:20px;">'+pct+'% allocated &middot; '+budgetItems.length+' items</div>'+
    '<div class="sh"><span class="st">Budget items</span><button class="btn-add" onclick="tog(\'b-add\')">+ Add item</button></div>'+
    '<div id="b-add" style="display:none;"><div class="add-row">'+
    '<input type="text" autocomplete="off" id="b-name" placeholder="Item name..." />'+
    '<input type="number" autocomplete="off" id="b-amt" placeholder="Amount (&#8369;)" style="width:130px;flex:none;" />'+
    '<input type="text" autocomplete="off" id="b-cat" placeholder="Category" style="width:130px;flex:none;" />'+
    '<input type="text" autocomplete="off" id="b-note" placeholder="Note (optional)" style="width:130px;flex:none;" />'+

    '</div></div>'+catsHTML;

      '</div>';
  }).join('')||'<div class="empty" style="padding:32px 0;">No locations yet. Add one above.</div>';
  const cmpHTML='<div style="overflow-x:auto;"><table class="cmp-table"><thead><tr><th>Location</th><th>Status</th><th>Size</th><th>Rent/sqm</th><th>CUSA/sqm</th><th>Flat rent</th><th>Total/month</th><th>Rating</th></tr></thead><tbody>'+
    locations.map(l=>'<tr><td>'+esc(l.name)+(l.area?'<br><span style="font-size:10px;color:var(--text-4);">'+esc(l.area)+'</span>':'')+'</td>'+
    '<td><span class="loc-badge '+(lsC[l.status]||'')+'">'+lsL[l.status]+'</span></td>'+
    '<td>'+(l.size_sqm?l.size_sqm+' sqm':'—')+'</td>'+
    '<td>'+(l.rent_per_sqm?'&#8369;'+fmt(l.rent_per_sqm):'—')+'</td>'+
    '<td>'+(l.cusa_per_sqm?'&#8369;'+fmt(l.cusa_per_sqm):'—')+'</td>'+
    '<td>'+(l.flat_rent?'&#8369;'+fmt(l.flat_rent):'—')+'</td>'+
    '<td style="color:#8FC4A8;font-family:var(--font-display);">&#8369;'+fmt(l.total_monthly||0)+(l.vat_included?' <span style="font-size:9px;color:var(--text-4);">VAT</span>':'')+'</td>'+
    '<td>'+[1,2,3,4,5].map(n=>'<span style="color:'+(l.rating>=n?'var(--brass-light)':'var(--text-4)')+';">'+String.fromCharCode(l.rating>=n?9733:9734)+'</span>').join('')+'</td></tr>').join('')+
    '</tbody></table></div>';
  return '<div class="metrics">'+
    '<div class="metric ta"><div class="metric-label">Tracked</div><div class="metric-value">'+locations.length+'</div></div>'+
    '<div class="metric ta"><div class="metric-label">Shortlisted</div><div class="metric-value">'+sl+'</div><div class="metric-sub good">top picks</div></div>'+
    '<div class="metric ta"><div class="metric-label">Avg rating</div><div class="metric-value">'+(avgR||'—')+'</div><div class="metric-sub">out of 5</div></div>'+
    '<div class="metric ta"><div class="metric-label">Lowest monthly</div><div class="metric-value">'+(minP?'&#8369;'+fmt(minP):'—')+'</div></div>'+
    '</div>'+
    '<div class="sh"><span class="st">Locations</span>'+
    '<div style="display:flex;gap:8px;align-items:center;">'+
    '<div class="view-btns"><button class="view-btn'+(locView==='cards'?' active':'')+'" onclick="locView=\'cards\';render();">Cards</button><button class="view-btn'+(locView==='compare'?' active':'')+'" onclick="locView=\'compare\';render();">Compare</button></div>'+
    '<button class="btn-add" onclick="openLocModal(null)">+ Add location</button>'+
    '</div></div>'+
    (locView==='cards'?'<div class="loc-grid">'+cardsHTML+'</div>':cmpHTML);
}

function openLocModal(id){
  const l=id?locations.find(x=>x.id===id):null;
  editLocId=id||null;
  const el=document.createElement('div');
  el.className='modal-overlay';el.id='loc-modal';
  const vatOn=l?l.vat_included:false;
  const total=l?l.total_monthly:0;
  el.innerHTML='<div class="modal">'+
    '<div class="modal-title">'+(l?'Edit location':'Add location')+'</div>'+
    '<div class="modal-grid">'+
    '<div class="mf full"><div class="ml">Location name / address</div><input autocomplete="off" class="mi" id="lf-name" placeholder="e.g. Unit 4B, The Bench BGC" value="'+esc(l?l.name:'')+'"/></div>'+
    '<div class="mf full"><div class="ml">Area / neighborhood</div><input autocomplete="off" class="mi" id="lf-area" placeholder="e.g. BGC, Taguig" value="'+esc(l?l.area||'':'')+'"/></div>'+
    '<div class="mf"><div class="ml">Status</div><select class="mi" id="lf-status">'+
    ['considering','viewing','shortlisted','rejected'].map(s=>'<option value="'+s+'"'+(l&&l.status===s?' selected':(!l&&s==='considering'?' selected':''))+'>'+lsL[s]+'</option>').join('')+
    '</select></div>'+
    '<div class="mf"><div class="ml">Rating (1–5)</div><select class="mi" id="lf-rating">'+
    [0,1,2,3,4,5].map(n=>'<option value="'+n+'"'+(l&&l.rating===n?' selected':(!l&&n===0?' selected':''))+'>'+( n===0?'No rating':n+' star'+(n>1?'s':''))+'</option>').join('')+
    '</select></div>'+
    '<div class="mf"><div class="ml">Size (sqm)</div><input autocomplete="off" type="number" class="mi" id="lf-sz" placeholder="e.g. 80" value="'+(l&&l.size_sqm?l.size_sqm:'')+'" oninput="updateLT()"/></div>'+
    '<div class="mf"></div>'+
    '<div class="mf"><div class="ml">Rent per sqm (&#8369;)</div><input autocomplete="off" type="number" class="mi" id="lf-rs" placeholder="e.g. 900" value="'+(l&&l.rent_per_sqm?l.rent_per_sqm:'')+'" oninput="updateLT()"/></div>'+
    '<div class="mf"><div class="ml">CUSA per sqm (&#8369;)</div><input autocomplete="off" type="number" class="mi" id="lf-cs" placeholder="e.g. 150" value="'+(l&&l.cusa_per_sqm?l.cusa_per_sqm:'')+'" oninput="updateLT()"/></div>'+
    '<div class="mf full"><div class="ml">Flat monthly rent (&#8369;) — if not per sqm</div><input autocomplete="off" type="number" class="mi" id="lf-fl" placeholder="e.g. 45000" value="'+(l&&l.flat_rent?l.flat_rent:'')+'" oninput="updateLT()"/></div>'+
    '<div class="mf full">'+
    '<div style="background:linear-gradient(135deg,rgba(61,81,72,0.2),var(--surface));border:0.5px solid var(--border-teal);border-radius:var(--radius);padding:10px 14px;">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">'+
    '<span style="font-size:10px;color:#8FC4A8;text-transform:uppercase;letter-spacing:0.06em;">Estimated total / month</span>'+
    '<span style="font-family:var(--font-display);font-size:18px;color:var(--sand);" id="lf-total">&#8369;'+fmt(total)+'</span></div>'+
    '<div class="vat-row">'+
    '<span style="font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.07em;">+ 12% VAT</span>'+
    '<div style="display:flex;align-items:center;gap:10px;">'+
    '<button type="button" id="vat-btn" class="vat-btn'+(vatOn?' on':'')+'" onclick="toggleVAT()">'+( vatOn?'On':'Off')+'</button>'+
    '<span style="font-family:var(--font-display);font-size:14px;color:var(--text-3);" id="lf-vat">'+(vatOn&&total?'&#8369;'+fmt(Math.round(total*1.12)):'')+'</span>'+
    '</div></div></div></div>'+
    '<div class="mf full"><div class="ml">Pros</div><textarea autocomplete="off" class="mt" id="lf-pros" placeholder="What\'s good about this space...">'+esc(l?l.pros||'':'')+'</textarea></div>'+
    '<div class="mf full"><div class="ml">Cons</div><textarea autocomplete="off" class="mt" id="lf-cons" placeholder="Any concerns or downsides...">'+esc(l?l.cons||'':'')+'</textarea></div>'+
    '<div class="mf full"><div class="ml">Notes</div><textarea autocomplete="off" class="mt" id="lf-notes" placeholder="Additional notes, contact info, viewing dates...">'+esc(l?l.notes||'':'')+'</textarea></div>'+
    '</div>'+
    '<div class="modal-actions"><button class="btn-g" onclick="closeLocModal()">Cancel</button><button class="btn-p" onclick="doSaveLoc()">Save location</button></div>'+
    '</div>';
  document.body.appendChild(el);
  el.addEventListener('click',e=>{if(e.target===el)closeLocModal();});
}

function updateLT(){
  const t=calcTotal(document.getElementById('lf-sz')?.value,document.getElementById('lf-rs')?.value,document.getElementById('lf-cs')?.value,document.getElementById('lf-fl')?.value);
  const el=document.getElementById('lf-total');if(el)el.innerHTML='&#8369;'+fmt(t);
  const vb=document.getElementById('vat-btn');
  const ve=document.getElementById('lf-vat');
  if(vb&&ve&&vb.classList.contains('on'))ve.innerHTML='&#8369;'+fmt(Math.round(t*1.12));
}

function toggleVAT(){
  const btn=document.getElementById('vat-btn');
  const ve=document.getElementById('lf-vat');
  if(!btn)return;
  const on=btn.classList.contains('on');
  if(on){btn.classList.remove('on');btn.textContent='Off';if(ve)ve.innerHTML='';}
  else{
    btn.classList.add('on');btn.textContent='On';
    const t=calcTotal(document.getElementById('lf-sz')?.value,document.getElementById('lf-rs')?.value,document.getElementById('lf-cs')?.value,document.getElementById('lf-fl')?.value);
    if(ve)ve.innerHTML='&#8369;'+fmt(Math.round(t*1.12));
  }
}

function closeLocModal(){const m=document.getElementById('loc-modal');if(m)m.remove();editLocId=null;}

async function doSaveLoc(){
  const name=document.getElementById('lf-name').value.trim();if(!name)return;
  const sz=parseFloat(document.getElementById('lf-sz').value)||null;
  const rs=parseFloat(document.getElementById('lf-rs').value)||null;
  const cs=parseFloat(document.getElementById('lf-cs').value)||null;
  const fl=parseFloat(document.getElementById('lf-fl').value)||null;
  const vatOn=document.getElementById('vat-btn').classList.contains('on');
  const base=calcTotal(sz,rs,cs,fl);
  const payload={name,area:document.getElementById('lf-area').value.trim()||null,status:document.getElementById('lf-status').value,rating:parseInt(document.getElementById('lf-rating').value)||0,size_sqm:sz,rent_per_sqm:rs,cusa_per_sqm:cs,flat_rent:fl,total_monthly:vatOn?Math.round(base*1.12):base,vat_included:vatOn,pros:document.getElementById('lf-pros').value.trim()||null,cons:document.getElementById('lf-cons').value.trim()||null,notes:document.getElementById('lf-notes').value.trim()||null};
  setSyncing('syncing');
  if(editLocId){await sb.from('locations').update(payload).eq('id',editLocId);}
  else{await sb.from('locations').insert(payload);}
  await reload('locations');setSyncing('ok');closeLocModal();
}

async function doDelLoc(id){setSyncing('syncing');await sb.from('locations').delete().eq('id',id);await reload('locations');setSyncing('ok');}

// ── INIT ──
document.getElementById('today-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
loadAll().then(()=>subscribeRealtime());
</script>
</body>
