<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sukoon — Internal Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brass:#B08D57;--brass-light:#C9A96E;--brass-dark:#8A6D3F;
  --teal:#3D5148;--teal-light:#4E6659;--teal-dark:#2C3C35;
  --teal-faint:rgba(61,81,72,0.18);--teal-faint2:rgba(61,81,72,0.28);
  --sand:#D6C6AE;--sand-light:#EDE3D4;--sand-dark:#C4B095;
  --bg:#181614;--bg-2:#1F1C18;--bg-3:#272320;--surface:#2E2A26;--surface-2:#373228;
  --text-1:#EDE3D4;--text-2:#C4B095;--text-3:#8A7D6A;--text-4:#574E43;
  --border:rgba(176,141,87,0.13);--border-2:rgba(176,141,87,0.24);--border-teal:rgba(61,81,72,0.5);
  --radius:8px;--radius-lg:12px;
  --font-display:'Cormorant Garamond',serif;--font-body:'DM Sans',sans-serif;
}
html,body{height:100%;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text-1);display:flex;height:100vh;overflow:hidden;}
.sidebar{width:224px;flex-shrink:0;background:var(--bg-2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto;box-shadow:inset -1px 0 0 rgba(61,81,72,0.3);}
.sidebar-brand{padding:20px 18px 16px;border-bottom:0.5px solid var(--border);background:linear-gradient(135deg,rgba(61,81,72,0.15) 0%,transparent 100%);}
.brand-mark{display:flex;align-items:center;gap:10px;}
.brand-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--teal) 0%,var(--brass-dark) 100%);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--sand-light);}
.brand-name{font-family:var(--font-display);font-size:19px;font-weight:600;color:var(--sand);letter-spacing:0.04em;}
.brand-sub{font-size:10px;color:var(--text-3);margin-top:1px;letter-spacing:0.06em;text-transform:uppercase;}
.nav-section{font-size:9px;font-weight:500;color:var(--text-4);text-transform:uppercase;letter-spacing:0.1em;padding:16px 18px 6px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;margin:1px 8px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text-3);transition:all 0.14s;user-select:none;}
.nav-item:hover{background:var(--teal-faint);color:var(--text-2);}
.nav-item.active{background:var(--teal-faint2);color:#8FC4A8;font-weight:500;border:0.5px solid var(--border-teal);}
.nav-icon{width:15px;height:15px;opacity:0.65;flex-shrink:0;}
.nav-item.active .nav-icon{opacity:1;}
.nav-badge{margin-left:auto;background:var(--teal-faint2);color:#8FC4A8;font-size:10px;padding:1px 6px;border-radius:10px;}
.sidebar-footer{margin-top:auto;padding:14px 18px;border-top:0.5px solid var(--border-teal);display:flex;align-items:center;gap:9px;background:var(--teal-faint);}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--sand);flex-shrink:0;}
.user-name{font-size:12px;color:var(--text-2);}
.user-role{font-size:10px;color:var(--text-4);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;border-bottom:0.5px solid var(--border-teal);background:linear-gradient(90deg,rgba(61,81,72,0.12) 0%,var(--bg-2) 40%);flex-shrink:0;}
.topbar-title{font-family:var(--font-display);font-size:21px;font-weight:500;color:var(--sand);letter-spacing:0.02em;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.date-chip{font-size:11px;color:var(--text-3);background:var(--teal-faint);border:0.5px solid var(--border-teal);border-radius:20px;padding:4px 12px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#5C9E7A;transition:background 0.3s;flex-shrink:0;}
.sync-dot.syncing{background:var(--brass);animation:pulse 1s infinite;}
.sync-dot.error{background:#C0704A;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.content{flex:1;overflow-y:auto;padding:24px;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text-3);font-size:13px;}
.spinner{width:28px;height:28px;border:2px solid var(--border-teal);border-top-color:#8FC4A8;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
.metric{background:var(--bg-3);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;}
.metric.teal-accent{border-color:var(--border-teal);background:linear-gradient(135deg,rgba(61,81,72,0.14),var(--bg-3));}
.metric-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;}
.metric-value{font-family:var(--font-display);font-size:28px;font-weight:500;color:var(--sand);line-height:1;}
.metric-sub{font-size:11px;color:var(--text-4);margin-top:4px;}
.metric-sub.good{color:#5C9E7A;}
.metric-sub.warn{color:#C0704A;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-family:var(--font-display);font-size:16px;font-weight:500;color:var(--sand);letter-spacing:0.02em;}
.btn-add{display:flex;align-items:center;gap:5px;font-size:12px;font-family:var(--font-body);color:#8FC4A8;background:var(--teal-faint);border:0.5px solid var(--border-teal);border-radius:var(--radius);padding:5px 12px;cursor:pointer;transition:all 0.12s;}
.btn-add:hover{background:var(--teal-faint2);}
.card{background:var(--bg-3);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px;}
.add-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;animation:slideDown 0.15s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
.add-row input,.add-row select{font-size:13px;font-family:var(--font-body);padding:8px 12px;border:0.5px solid var(--border-teal);border-radius:var(--radius);background:var(--surface);color:var(--text-1);outline:none;}
.add-row input{flex:1;min-width:120px;}
.add-row input:focus{border-color:var(--teal-light);}
.add-row select{color:var(--text-2);cursor:pointer;}
.btn-primary{font-size:12px;font-family:var(--font-body);padding:8px 16px;background:var(--teal);color:var(--sand);border:none;border-radius:var(--radius);cursor:pointer;font-weight:500;transition:background 0.12s;}
.btn-primary:hover{background:var(--teal-light);}
.btn-ghost{font-size:12px;font-family:var(--font-body);padding:8px 12px;background:none;color:var(--text-3);border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.12s;}
.btn-ghost:hover{background:var(--surface);color:var(--text-2);}
.btn-del{background:none;border:none;color:var(--text-4);cursor:pointer;padding:3px 6px;border-radius:4px;font-size:13px;line-height:1;transition:all 0.12s;flex-shrink:0;}
.btn-del:hover{color:#C0704A;background:rgba(192,112,74,0.12);}
.prog-bar{height:4px;background:var(--surface-2);border-radius:10px;margin:8px 0 4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:10px;background:var(--teal-light);transition:width 0.4s ease;}
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.mini-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:12px;color:var(--text-3);}
.mini-row:last-child{border-bottom:none;}
.empty{font-size:12px;color:var(--text-4);padding:12px 0;text-align:center;}
.task-list{display:flex;flex-direction:column;gap:5px;margin-bottom:20px;}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg-3);transition:border-color 0.12s,background 0.12s;}
.task-item:hover{border-color:var(--border-teal);background:var(--surface);}
.task-item.done{opacity:0.38;}
.task-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--teal-light);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.12s;cursor:pointer;}
.task-item.done .task-check{background:var(--teal);border-color:var(--teal);}
.check-svg{width:9px;height:9px;stroke:var(--sand);fill:none;stroke-width:2.2;}
.task-body{flex:1;min-width:0;cursor:pointer;}
.task-name{font-size:13px;color:var(--text-1);line-height:1.45;}
.task-item.done .task-name{text-decoration:line-through;color:var(--text-4);}
.task-meta{display:flex;align-items:center;gap:8px;margin-top:5px;}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;}
.tag-product{background:rgba(61,81,72,0.35);color:#8FC4A8;border:0.5px solid rgba(61,81,72,0.6);}
.tag-growth{background:rgba(176,141,87,0.15);color:var(--brass-light);border:0.5px solid rgba(176,141,87,0.3);}
.tag-ops{background:rgba(153,107,72,0.2);color:#D4A07A;border:0.5px solid rgba(153,107,72,0.4);}
.tag-eng{background:rgba(45,70,80,0.35);color:#7AB8CC;border:0.5px solid rgba(45,70,80,0.6);}
.tag-finance{background:rgba(120,100,60,0.2);color:#C8B080;border:0.5px solid rgba(120,100,60,0.4);}
.task-due{font-size:11px;color:var(--text-4);}
.task-due.hot{color:#C0704A;}
.prio-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.p-high{background:#C0704A;}.p-mid{background:var(--brass);}.p-low{background:var(--teal-light);}
.okr-list{display:flex;flex-direction:column;gap:14px;margin-bottom:20px;}
.okr-card{background:var(--bg-3);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;transition:border-color 0.12s;}
.okr-card:hover{border-color:var(--border-teal);}
.okr-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;gap:10px;}
.okr-title{font-family:var(--font-display);font-size:15px;font-weight:500;color:var(--sand);flex:1;}
.okr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.okr-pct{font-family:var(--font-display);font-size:20px;font-weight:500;color:#8FC4A8;}
.okr-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.term-pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;}
.term-short{background:rgba(176,141,87,0.15);color:var(--brass-light);border:0.5px solid rgba(176,141,87,0.3);}
.term-medium{background:rgba(61,81,72,0.3);color:#8FC4A8;border:0.5px solid rgba(61,81,72,0.5);}
.term-long{background:rgba(45,70,80,0.35);color:#7AB8CC;border:0.5px solid rgba(45,70,80,0.6);}
.deadline-chip{font-size:10px;color:var(--text-4);}
.kr-list{display:flex;flex-direction:column;gap:9px;margin-top:4px;}
.kr-row{display:flex;align-items:center;gap:10px;}
.kr-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--teal-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.12s;}
.kr-check.checked{background:var(--teal);border-color:var(--teal);}
.kr-check-svg{width:8px;height:8px;stroke:var(--sand);fill:none;stroke-width:2.2;}
.kr-body{flex:1;min-width:0;}
.kr-label-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);margin-bottom:4px;}
.kr-label-row span:last-child{color:var(--text-4);font-size:11px;}
.kr-bar{height:3px;background:var(--surface-2);border-radius:10px;overflow:hidden;}
.kr-fill{height:100%;border-radius:10px;transition:width 0.4s ease;}
.kr-fill.on-track{background:#5C9E7A;}.kr-fill.at-risk{background:var(--brass);}.kr-fill.behind{background:#C0704A;}
.kr-row.done-kr .kr-body{opacity:0.38;}
.kr-row.done-kr .kr-label-row span:first-child{text-decoration:line-through;}
.okr-add-kr{margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;}
.okr-add-kr input,.okr-add-kr select{font-size:12px;font-family:var(--font-body);padding:6px 10px;border:0.5px solid var(--border-teal);border-radius:var(--radius);background:var(--surface);color:var(--text-1);outline:none;}
.okr-add-kr input{flex:1;min-width:100px;}
.okr-add-kr input:focus{border-color:var(--teal-light);}
.btn-sm{font-size:11px;font-family:var(--font-body);padding:6px 12px;background:var(--teal-faint2);color:#8FC4A8;border:0.5px solid var(--border-teal);border-radius:var(--radius);cursor:pointer;transition:all 0.12s;white-space:nowrap;}
.btn-sm:hover{background:var(--teal-faint);}
.budget-header-row{display:flex;align-items:center;gap:20px;padding:16px 20px;margin-bottom:16px;background:linear-gradient(135deg,rgba(61,81,72,0.2),var(--bg-3));border:0.5px solid var(--border-teal);border-radius:var(--radius-lg);flex-wrap:wrap;}
.budget-total-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;}
.budget-total-input{font-family:var(--font-display);font-size:22px;background:none;border:none;border-bottom:1px solid var(--border-teal);color:var(--sand);outline:none;width:200px;padding:2px 4px;}
.budget-total-input:focus{border-bottom-color:var(--teal-light);}
.cat-section{margin-bottom:16px;}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--teal-faint);border-radius:var(--radius) var(--radius) 0 0;border:0.5px solid var(--border-teal);}
.cat-name{font-size:12px;font-weight:500;color:#8FC4A8;}
.cat-total{font-size:12px;color:var(--text-3);}
.budget-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border:0.5px solid var(--border);border-top:none;background:var(--bg-3);font-size:13px;}
.budget-item:last-child{border-radius:0 0 var(--radius) var(--radius);}
.b-name{flex:1;color:var(--text-1);}
.b-note{font-size:11px;color:var(--text-4);}
.b-amt{font-family:var(--font-display);font-size:15px;color:var(--sand);white-space:nowrap;}
.alloc-bar{height:3px;background:var(--surface-2);border-radius:10px;margin-top:3px;overflow:hidden;}
.alloc-fill{height:100%;border-radius:10px;background:var(--teal-light);}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:20px;}
.contact-card{background:var(--bg-3);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;transition:border-color 0.12s;position:relative;}
.contact-card:hover{border-color:var(--border-teal);}
.contact-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.c-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:14px;font-weight:500;flex-shrink:0;}
.c-name{font-size:14px;font-weight:500;color:var(--text-1);}
.c-role{font-size:11px;color:var(--text-3);margin-top:1px;}
.c-details{display:flex;flex-direction:column;gap:5px;}
.c-detail-row{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-3);}
.status-pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;margin-top:8px;}
.s-lead{background:rgba(176,141,87,0.15);color:var(--brass-light);border:0.5px solid rgba(176,141,87,0.3);}
.s-partner{background:rgba(61,81,72,0.35);color:#8FC4A8;border:0.5px solid rgba(61,81,72,0.55);}
.s-investor{background:rgba(45,70,80,0.35);color:#7AB8CC;border:0.5px solid rgba(45,70,80,0.6);}
.s-vendor{background:rgba(153,107,72,0.2);color:#D4A07A;border:0.5px solid rgba(153,107,72,0.4);}
.s-customer{background:rgba(92,80,50,0.25);color:#C8B080;border:0.5px solid rgba(120,100,60,0.4);}
.card-del{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text-4);cursor:pointer;font-size:14px;padding:3px 6px;border-radius:4px;transition:all 0.12s;line-height:1;}
.card-del:hover{color:#C0704A;background:rgba(192,112,74,0.12);}
.home-greeting{font-family:var(--font-display);font-size:32px;font-weight:500;color:var(--sand);margin-bottom:4px;letter-spacing:0.02em;}
.home-sub{font-size:13px;color:var(--text-3);margin-bottom:24px;}
.home-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px;}
.home-nav-card{background:var(--bg-3);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px;cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;gap:6px;}
.home-nav-card:hover{border-color:var(--border-teal);background:var(--surface);}
.hnc-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:2px;}
.hnc-title{font-family:var(--font-display);font-size:16px;font-weight:500;color:var(--sand);}
.hnc-desc{font-size:12px;color:var(--text-3);line-height:1.5;}
.hnc-count{font-size:11px;color:#8FC4A8;margin-top:2px;}

/* LOCATIONS */
.loc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:20px;}
.loc-card{background:var(--bg-3);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;transition:border-color 0.12s;position:relative;}
.loc-card:hover{border-color:var(--border-teal);}
.loc-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.loc-name{font-family:var(--font-display);font-size:15px;font-weight:500;color:var(--sand);line-height:1.3;flex:1;}
.loc-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.loc-shortlisted{background:rgba(61,81,72,0.35);color:#8FC4A8;border:0.5px solid rgba(61,81,72,0.6);}
.loc-viewing{background:rgba(176,141,87,0.18);color:var(--brass-light);border:0.5px solid rgba(176,141,87,0.35);}
.loc-rejected{background:rgba(192,112,74,0.18);color:#D4947A;border:0.5px solid rgba(192,112,74,0.35);}
.loc-considering{background:rgba(45,70,80,0.35);color:#7AB8CC;border:0.5px solid rgba(45,70,80,0.6);}
.loc-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.loc-stat{background:var(--surface);border-radius:var(--radius);padding:8px 10px;}
.loc-stat-label{font-size:9px;color:var(--text-4);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px;}
.loc-stat-val{font-family:var(--font-display);font-size:14px;color:var(--sand);}
.loc-total{background:linear-gradient(135deg,rgba(61,81,72,0.2),var(--surface));border:0.5px solid var(--border-teal);border-radius:var(--radius);padding:8px 10px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.loc-total-label{font-size:10px;color:#8FC4A8;text-transform:uppercase;letter-spacing:0.06em;}
.loc-total-val{font-family:var(--font-display);font-size:18px;color:var(--sand);}
.loc-stars{display:flex;gap:3px;margin-bottom:8px;}
.star{font-size:14px;cursor:pointer;color:var(--text-4);transition:color 0.1s;line-height:1;}
.star.filled{color:var(--brass-light);}
.loc-notes{font-size:11px;color:var(--text-3);line-height:1.55;margin-bottom:10px;white-space:pre-wrap;}
.loc-pc{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.loc-pc-box{background:var(--surface);border-radius:var(--radius);padding:8px 10px;}
.loc-pc-label{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;}
.loc-pc-label.pro{color:#5C9E7A;}
.loc-pc-label.con{color:#C0704A;}
.loc-pc-text{font-size:11px;color:var(--text-3);line-height:1.5;white-space:pre-wrap;}
.loc-actions{display:flex;gap:6px;margin-top:4px;}
.loc-action-btn{font-size:11px;font-family:var(--font-body);padding:4px 10px;background:none;border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text-3);cursor:pointer;transition:all 0.12s;}
.loc-action-btn:hover{background:var(--teal-faint);color:#8FC4A8;border-color:var(--border-teal);}
.compare-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px;}
.compare-table th{text-align:left;padding:8px 12px;background:var(--teal-faint);color:#8FC4A8;font-size:10px;text-transform:uppercase;letter-spacing:0.07em;font-weight:500;border:0.5px solid var(--border-teal);}
.compare-table td{padding:9px 12px;border:0.5px solid var(--border);color:var(--text-2);vertical-align:top;}
.compare-table tr:nth-child(even) td{background:var(--bg-3);}
.compare-table tr:nth-child(odd) td{background:var(--bg-2);}
.compare-table td:first-child{font-weight:500;color:var(--text-1);}
.loc-view-toggle{display:flex;gap:6px;align-items:center;}
.view-btn{font-size:11px;font-family:var(--font-body);padding:4px 10px;background:none;border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text-3);cursor:pointer;transition:all 0.12s;}
.view-btn.active{background:var(--teal-faint2);color:#8FC4A8;border-color:var(--border-teal);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg-2);border:0.5px solid var(--border-teal);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:var(--font-display);font-size:18px;font-weight:500;color:var(--sand);margin-bottom:18px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.modal-field{display:flex;flex-direction:column;gap:5px;}
.modal-field.full{grid-column:1/-1;}
.modal-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.07em;}
.modal-input{font-size:13px;font-family:var(--font-body);padding:8px 12px;border:0.5px solid var(--border-teal);border-radius:var(--radius);background:var(--surface);color:var(--text-1);outline:none;width:100%;}
.modal-input:focus{border-color:var(--teal-light);}
.modal-textarea{font-size:12px;font-family:var(--font-body);padding:8px 12px;border:0.5px solid var(--border-teal);border-radius:var(--radius);background:var(--surface);color:var(--text-1);outline:none;width:100%;resize:vertical;min-height:60px;line-height:1.5;}
.modal-textarea:focus{border-color:var(--teal-light);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.price-mode-toggle{display:flex;gap:6px;margin-bottom:10px;}
.pm-btn{font-size:11px;font-family:var(--font-body);padding:4px 10px;background:none;border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text-3);cursor:pointer;transition:all 0.12s;}
.pm-btn.active{background:var(--teal-faint2);color:#8FC4A8;border-color:var(--border-teal);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:10px;}
</style>
</head>
<body>

  </div>
  <div class="nav-item" onclick="nav('budget',this)">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12v8H2z"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1"/><path d="M8 8v.01"/></svg>Budget Planner
  </div>
  <div class="nav-item" onclick="nav('crm',this)">

  </div>

    Space Scouting

</div>
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">Home</div>
    <div class="topbar-right">
      <div class="sync-dot" id="sync-dot" title="Sync status"></div>
      <span class="date-chip" id="today-date"></span>

    <div class="loading-screen"><div class="spinner"></div><span>Connecting to Sukoon...</span></div>
  </div>
</div>
<script>
const SUPABASE_URL='https://decufrbbajkqoatdeoov.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlY3VmcmJiYWprcW9hdGRlb292Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzg5MzQsImV4cCI6MjA5MTcxNDkzNH0.KBRpEcV6umHc17bJW7eqeq53FDfW57fTgezn_vgJDJk';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let tasks=[],okrs=[],krMap={},budgetTotal=0,budgetItems=[],contacts=[],locations=[],budgetRowId=null;
let locView='cards',editingLocId=null;
let currentPage='home';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(n){return Number(n||0).toLocaleString('en-PH');}
function initials(n){return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function setSyncing(s){const d=document.getElementById('sync-dot');if(!d)return;d.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');}

const tagLabels={product:"Product",growth:"Growth",ops:"Ops",eng:"Eng",finance:"Finance"};
const aColors=[{bg:'rgba(61,81,72,0.4)',color:'#8FC4A8'},{bg:'rgba(176,141,87,0.2)',color:'#C9A96E'},{bg:'rgba(45,70,80,0.4)',color:'#7AB8CC'},{bg:'rgba(153,107,72,0.2)',color:'#D4A07A'},{bg:'rgba(92,80,50,0.3)',color:'#C8B080'}];
const statusLabels={lead:'Lead',partner:'Partner',investor:'Investor',vendor:'Vendor',customer:'Customer'};
const statusClass={lead:'s-lead',partner:'s-partner',investor:'s-investor',vendor:'s-vendor',customer:'s-customer'};
const termLabels={short:'Short-term',medium:'Medium-term',long:'Long-term'};
const termClass={short:'term-short',medium:'term-medium',long:'term-long'};
const pageTitles={home:'Home',tasks:'Tasks',okr:'Goals & OKRs',budget:'Budget Planner',crm:'Contacts & CRM',locations:'Space Scouting'};

async function loadAll(){
  try{
    const[t,o,kr,b,bi,c]=await Promise.all([
      sb.from('tasks').select('*').order('created_at'),
      sb.from('okrs').select('*').order('created_at'),
      sb.from('key_results').select('*').order('created_at'),
      sb.from('budget').select('*').limit(1).single(),
      sb.from('budget_items').select('*').order('created_at'),
      sb.from('contacts').select('*').order('created_at'),
      sb.from('locations').select('*').order('created_at'),
    ]);
    tasks=t.data||[];
    okrs=o.data||[];
    krMap={};(kr.data||[]).forEach(k=>{if(!krMap[k.okr_id])krMap[k.okr_id]=[];krMap[k.okr_id].push(k);});
    budgetRowId=b.data?.id||null;
    budgetTotal=b.data?.total_budget||0;
    budgetItems=bi.data||[];
    contacts=c.data||[];
    const loc=await sb.from('locations').select('*').order('created_at');
    locations=loc.data||[];
    render();
  }catch(e){setSyncing('error');console.error(e);}
}

function subscribeRealtime(){
  sb.channel('sukoon-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},()=>reload('tasks'))
    .on('postgres_changes',{event:'*',schema:'public',table:'okrs'},()=>reload('okrs'))
    .on('postgres_changes',{event:'*',schema:'public',table:'key_results'},()=>reload('krs'))
    .on('postgres_changes',{event:'*',schema:'public',table:'budget'},()=>reload('budget'))
    .on('postgres_changes',{event:'*',schema:'public',table:'budget_items'},()=>reload('budget_items'))
    .on('postgres_changes',{event:'*',schema:'public',table:'contacts'},()=>reload('contacts'))
    .on('postgres_changes',{event:'*',schema:'public',table:'locations'},()=>reload('locations'))
    .subscribe();
}

async function reload(table){
  if(table==='tasks'){const{data}=await sb.from('tasks').select('*').order('created_at');tasks=data||[];}
  if(table==='okrs'){const{data}=await sb.from('okrs').select('*').order('created_at');okrs=data||[];}
  if(table==='krs'){const{data}=await sb.from('key_results').select('*').order('created_at');krMap={};(data||[]).forEach(k=>{if(!krMap[k.okr_id])krMap[k.okr_id]=[];krMap[k.okr_id].push(k);});}
  if(table==='budget'){const{data}=await sb.from('budget').select('*').limit(1).single();budgetRowId=data?.id||null;budgetTotal=data?.total_budget||0;}
  if(table==='budget_items'){const{data}=await sb.from('budget_items').select('*').order('created_at');budgetItems=data||[];}
  if(table==='contacts'){const{data}=await sb.from('contacts').select('*').order('created_at');contacts=data||[];}
  if(table==='locations'){const{data}=await sb.from('locations').select('*').order('created_at');locations=data||[];}
  render();
}

function nav(page,el){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el)el.classList.add('active');
  document.getElementById('page-title').textContent=pageTitles[page];
  render();
}

function render(){
  updateBadges();
  const c=document.getElementById('content');
  if(currentPage==='home')c.innerHTML=renderHome();
  if(currentPage==='tasks')c.innerHTML=renderTasks();
  if(currentPage==='okr')c.innerHTML=renderOKR();
  if(currentPage==='budget')c.innerHTML=renderBudget();
  if(currentPage==='crm')c.innerHTML=renderCRM();
  if(currentPage==='locations')c.innerHTML=renderLocations();
}

function updateBadges(){const el=document.getElementById('nb-tasks');if(el)el.textContent=tasks.filter(t=>!t.done).length;}

function toggleEl(id){
  const el=document.getElementById(id);if(!el)return;
  const open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  if(!open){const inp=el.querySelector('input');if(inp)inp.focus();}
}

function renderHome(){
  const hour=new Date().getHours();
  const greet=hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';
  const pending=tasks.filter(t=>!t.done).length;
  const todayT=tasks.filter(t=>t.due==='today'&&!t.done).length;
  const alloc=budgetItems.reduce((a,b)=>a+b.amount,0);
  const rem=budgetTotal-alloc;
  const avgOkr=okrs.length?Math.round(okrs.map(o=>{const krs=krMap[o.id]||[];if(!krs.length)return 0;return Math.round(krs.reduce((a,k)=>a+Math.min(100,Math.round(k.current_val/k.target_val*100)),0)/krs.length);}).reduce((a,b)=>a+b,0)/okrs.length):0;
  const navItems=document.querySelectorAll('.nav-item');
  return `<div class="home-greeting">${greet}, founders.</div>
    <div class="home-sub">Here's where Sukoon stands today.</div>
    <div class="metrics">
      <div class="metric teal-accent"><div class="metric-label">Open tasks</div><div class="metric-value">${pending}</div><div class="metric-sub${todayT>0?' warn':''}">${todayT} due today</div></div>
      <div class="metric teal-accent"><div class="metric-label">OKR progress</div><div class="metric-value">${avgOkr}%</div><div class="metric-sub good">across ${okrs.length} objectives</div></div>
      <div class="metric teal-accent"><div class="metric-label">Budget remaining</div><div class="metric-value">&#8369;${fmt(rem)}</div><div class="metric-sub">of &#8369;${fmt(budgetTotal)}</div></div>
      <div class="metric teal-accent"><div class="metric-label">Contacts</div><div class="metric-value">${contacts.length}</div><div class="metric-sub">${contacts.filter(c=>c.status==='lead').length} leads &middot; ${contacts.filter(c=>c.status==='customer').length} customers</div></div>
    </div>
    <div class="home-cards">
      <div class="home-nav-card" onclick="nav('tasks',document.querySelectorAll('.nav-item')[1])"><div class="hnc-icon" style="background:rgba(61,81,72,0.3);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#8FC4A8" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 8l2 2 4-4"/></svg></div><div class="hnc-title">Task Manager</div><div class="hnc-desc">Track everything your startup needs to get done.</div><div class="hnc-count">${pending} open tasks</div></div>
      <div class="home-nav-card" onclick="nav('okr',document.querySelectorAll('.nav-item')[2])"><div class="hnc-icon" style="background:rgba(61,81,72,0.2);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#8FC4A8" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><circle cx="8" cy="8" r="3"/><circle cx="8" cy="8" r="1" fill="#8FC4A8"/></svg></div><div class="hnc-title">Goals & OKRs</div><div class="hnc-desc">Set short, medium, and long-term objectives with trackable key results.</div><div class="hnc-count">${okrs.length} objectives &middot; ${avgOkr}% avg progress</div></div>
      <div class="home-nav-card" onclick="nav('budget',document.querySelectorAll('.nav-item')[3])"><div class="hnc-icon" style="background:rgba(61,81,72,0.2);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#8FC4A8" stroke-width="1.5"><path d="M2 4h12v8H2z"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1"/><path d="M8 8v.01"/></svg></div><div class="hnc-title">Budget Planner</div><div class="hnc-desc">Allocate your total budget across categories and line items.</div><div class="hnc-count">&#8369;${fmt(rem)} remaining</div></div>
      <div class="home-nav-card" onclick="nav('crm',document.querySelectorAll('.nav-item')[4])"><div class="hnc-icon" style="background:rgba(61,81,72,0.2);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#8FC4A8" stroke-width="1.5"><circle cx="6" cy="5" r="2.5"/><path d="M2 13c0-2.2 1.8-4 4-4s4 1.8 4 4"/><circle cx="12" cy="5" r="2"/><path d="M12 9c1.7 0 3 1.3 3 3"/></svg></div><div class="hnc-title">Contacts & CRM</div><div class="hnc-desc">Track investors, partners, customers, vendors, and leads.</div><div class="hnc-count">${contacts.length} contacts</div></div>
      <div class="home-nav-card" onclick="nav('locations',document.querySelectorAll('.nav-item')[5])"><div class="hnc-icon" style="background:rgba(61,81,72,0.2);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#8FC4A8" stroke-width="1.5"><path d="M8 1.5C5.5 1.5 3.5 3.5 3.5 6c0 3.5 4.5 8.5 4.5 8.5s4.5-5 4.5-8.5c0-2.5-2-4.5-4.5-4.5z"/><circle cx="8" cy="6" r="1.5"/></svg></div><div class="hnc-title">Space Scouting</div><div class="hnc-desc">Compare retail locations, track pricing, and shortlist your top spots.</div><div class="hnc-count">${locations.length} locations tracked</div></div>
    </div>
    <div class="section-header"><span class="section-title">Today's priorities</span></div>
    <div style="display:flex;flex-direction:column;gap:5px;">
      ${tasks.filter(t=>!t.done&&t.due==='today').map(t=>`<div class="mini-row"><div class="prio-dot p-${t.priority}"></div><span style="flex:1;color:var(--text-2);">${esc(t.name)}</span><span class="tag tag-${t.tag}">${tagLabels[t.tag]||t.tag}</span></div>`).join('')||'<div class="empty">Nothing due today.</div>'}
    </div>`;
}

function renderTasks(){
  const total=tasks.length,done=tasks.filter(t=>t.done).length;
  const pct=total?Math.round(done/total*100):0;
  const high=tasks.filter(t=>t.priority==='high'&&!t.done).length;
  const today=tasks.filter(t=>t.due==='today'&&!t.done).length;
  const areas=['product','growth','ops','eng','finance'];
  const aN={product:'Product',growth:'Growth',ops:'Operations',eng:'Engineering',finance:'Finance'};
  const aC={product:'#5C9E7A',growth:'#B08D57',ops:'#C0704A',eng:'#5A8FA0',finance:'#A89060'};
  return `<div class="metrics">
    <div class="metric"><div class="metric-label">Total</div><div class="metric-value">${total}</div><div class="metric-sub">tasks</div></div>
    <div class="metric"><div class="metric-label">Completed</div><div class="metric-value">${done}</div><div class="metric-sub good">${pct}% done</div></div>
    <div class="metric"><div class="metric-label">High priority</div><div class="metric-value">${high}</div><div class="metric-sub${high>0?' warn':''}">open</div></div>
    <div class="metric"><div class="metric-label">Due today</div><div class="metric-value">${today}</div><div class="metric-sub">remaining</div></div>
    </div>
    <div class="section-header"><span class="section-title">All tasks</span><button class="btn-add" onclick="toggleEl('task-add-row')">+ Add task</button></div>
    <div id="task-add-row" style="display:none;"><div class="add-row">
      <input autocomplete="off" type="text" id="t-name" placeholder="Task name..." onkeydown="if(event.key==='Enter')addTask()" />
      <select id="t-tag"><option value="ops">Ops</option><option value="product">Product</option><option value="growth">Growth</option><option value="eng">Engineering</option><option value="finance">Finance</option></select>
      <select id="t-prio"><option value="mid">Mid priority</option><option value="high">High priority</option><option value="low">Low priority</option></select>
      <select id="t-due"><option value="today">Today</option><option value="tomorrow">Tomorrow</option><option value="this week" selected>This week</option><option value="next week">Next week</option></select>
      <button class="btn-primary" onclick="addTask()">Add</button>
      <button class="btn-ghost" onclick="toggleEl('task-add-row')">Cancel</button>
    </div></div>
    <div class="task-list">
      ${tasks.map(t=>`<div class="task-item${t.done?' done':''}">
        <div class="task-check" onclick="toggleTask('${t.id}',${!t.done})">${t.done?'<svg class="check-svg" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>':''}</div>
        <div class="task-body" onclick="toggleTask('${t.id}',${!t.done})">
          <div class="task-name">${esc(t.name)}</div>
          <div class="task-meta"><span class="tag tag-${t.tag}">${tagLabels[t.tag]||t.tag}</span><span class="task-due${t.due==='today'?' hot':''}">${esc(t.due)}</span></div>
        </div>
        <div class="prio-dot p-${t.priority}"></div>
        <button class="btn-del" onclick="deleteTask('${t.id}')">&#x2715;</button>
      </div>`).join('')||'<div class="empty">No tasks yet. Add one above.</div>'}
    </div>
    <div class="bottom-grid">
      <div class="card">
        <div class="section-header" style="margin-bottom:6px;"><span class="section-title">Sprint progress</span><span style="font-size:12px;color:var(--text-4);">${done} / ${total}</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
        <div style="font-size:11px;color:var(--text-4);margin-bottom:14px;">${pct===0?'Just getting started':`${pct}% complete`}</div>
        <div style="font-size:12px;font-weight:500;color:var(--text-3);margin-bottom:10px;">By area</div>
        ${areas.map(a=>{const tot=tasks.filter(t=>t.tag===a).length;if(!tot)return'';const dn=tasks.filter(t=>t.tag===a&&t.done).length,p=Math.round(dn/tot*100);return`<div style="margin-bottom:9px;"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);margin-bottom:3px;"><span>${aN[a]}</span><span>${dn}/${tot}</span></div><div class="prog-bar" style="margin:0;"><div style="height:100%;border-radius:10px;width:${p}%;background:${aC[a]};transition:width 0.4s;"></div></div></div>`;}).join('')}
      </div>
      <div class="card">
        <div class="section-header" style="margin-bottom:8px;"><span class="section-title">Upcoming</span></div>

          <div class="kr-list">

              <div class="kr-check${k.done?' checked':''}" onclick="toggleKR('${k.id}',${!k.done})">${k.done?'<svg class="kr-check-svg" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>':''}</div>
              <div class="kr-body"><div class="kr-label-row"><span>${esc(k.label)}</span><span>${fmt(k.current_val)} / ${fmt(k.target_val)}</span></div><div class="kr-bar"><div class="kr-fill ${k.status}" style="width:${kp}%"></div></div></div>
              <button class="btn-del" onclick="deleteKR('${k.id}')">&#x2715;</button>
            </div>`;}).join('')||'<div style="font-size:12px;color:var(--text-4);padding:6px 0;">No key results yet.</div>'}
          </div>
          <div class="okr-add-kr">

function renderBudget(){

    </div>
    <div class="metrics" style="grid-template-columns:repeat(3,1fr);margin-bottom:12px;">

function calcTotal(sizeSqm,rentPerSqm,cusaPerSqm,flatRent){
  const perSqmTotal=(parseFloat(rentPerSqm)||0)+(parseFloat(cusaPerSqm)||0);
  const perSqmMonthly=perSqmTotal*(parseFloat(sizeSqm)||0);
  const flat=parseFloat(flatRent)||0;
  return Math.round(perSqmMonthly+flat);
}

        <select class="modal-input" id="lf-status">
          <option value="considering" ${(l?.status||'considering')==='considering'?'selected':''}>Considering</option>
          <option value="viewing" ${l?.status==='viewing'?'selected':''}>Viewing Scheduled</option>
          <option value="shortlisted" ${l?.status==='shortlisted'?'selected':''}>Shortlisted</option>
          <option value="rejected" ${l?.status==='rejected'?'selected':''}>Rejected</option>
        </select>
      </div>
      <div class="modal-field"><div class="modal-label">Rating (1–5)</div>
        <select class="modal-input" id="lf-rating">
          ${[0,1,2,3,4,5].map(n=>`<option value="${n}" ${(l?.rating||0)===n?'selected':''}>${n===0?'No rating':n+' star'+(n>1?'s':'')}</option>`).join('')}
        </select>
      </div>
      <div class="modal-field"><div class="modal-label">Size (sqm)</div><input autocomplete="off" type="number" class="modal-input" id="lf-size" placeholder="e.g. 80" value="${l?.size_sqm||''}" oninput="updateLocTotal()" /></div>
      <div class="modal-field"></div>
      <div class="modal-field"><div class="modal-label">Rent per sqm (&#8369;)</div><input autocomplete="off" type="number" class="modal-input" id="lf-rent-sqm" placeholder="e.g. 900" value="${l?.rent_per_sqm||''}" oninput="updateLocTotal()" /></div>
      <div class="modal-field"><div class="modal-label">CUSA per sqm (&#8369;)</div><input autocomplete="off" type="number" class="modal-input" id="lf-cusa-sqm" placeholder="e.g. 150" value="${l?.cusa_per_sqm||''}" oninput="updateLocTotal()" /></div>
      <div class="modal-field full"><div class="modal-label">Flat monthly rent (&#8369;) &mdash; if not per sqm</div><input autocomplete="off" type="number" class="modal-input" id="lf-flat" placeholder="e.g. 45000" value="${l?.flat_rent||''}" oninput="updateLocTotal()" /></div>
      <div class="modal-field full">
        <div class="loc-total" style="margin-bottom:0;">
          <span class="loc-total-label">Estimated total / month</span>
          <span class="loc-total-val" id="lf-total">&#8369;${fmt(l?.total_monthly||0)}</span>
        </div>
      </div>
      <div class="modal-field full"><div class="modal-label">Pros</div><textarea autocomplete="off" class="modal-textarea" id="lf-pros" placeholder="What's good about this space...">${esc(l?.pros||'')}</textarea></div>
      <div class="modal-field full"><div class="modal-label">Cons</div><textarea autocomplete="off" class="modal-textarea" id="lf-cons" placeholder="Any concerns or downsides...">${esc(l?.cons||'')}</textarea></div>
      <div class="modal-field full"><div class="modal-label">Notes</div><textarea autocomplete="off" class="modal-textarea" id="lf-notes" placeholder="Additional notes, contact info, viewing dates...">${esc(l?.notes||'')}</textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeLocModal()">Cancel</button>
      <button class="btn-primary" onclick="saveLoc()">Save location</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeLocModal();});
}

function updateLocTotal(){
  const size=document.getElementById('lf-size')?.value;
  const rent=document.getElementById('lf-rent-sqm')?.value;
  const cusa=document.getElementById('lf-cusa-sqm')?.value;
  const flat=document.getElementById('lf-flat')?.value;
  const total=calcTotal(size,rent,cusa,flat);
  const el=document.getElementById('lf-total');
  if(el)el.innerHTML='&#8369;'+fmt(total);
}

function closeLocModal(){const m=document.getElementById('loc-modal');if(m)m.remove();editingLocId=null;}

async function saveLoc(){
  const name=document.getElementById('lf-name').value.trim();if(!name)return;
  const size=parseFloat(document.getElementById('lf-size').value)||null;
  const rentSqm=parseFloat(document.getElementById('lf-rent-sqm').value)||null;
  const cusaSqm=parseFloat(document.getElementById('lf-cusa-sqm').value)||null;
  const flat=parseFloat(document.getElementById('lf-flat').value)||null;
  const total=calcTotal(size,rentSqm,cusaSqm,flat);
  const payload={
    name,
    area:document.getElementById('lf-area').value.trim()||null,
    status:document.getElementById('lf-status').value,
    rating:parseInt(document.getElementById('lf-rating').value)||0,
    size_sqm:size,
    rent_per_sqm:rentSqm,
    cusa_per_sqm:cusaSqm,
    flat_rent:flat,
    total_monthly:total,
    pros:document.getElementById('lf-pros').value.trim()||null,
    cons:document.getElementById('lf-cons').value.trim()||null,
    notes:document.getElementById('lf-notes').value.trim()||null,
  };
  setSyncing('syncing');
  if(editingLocId){await sb.from('locations').update(payload).eq('id',editingLocId);}
  else{await sb.from('locations').insert(payload);}
  await reload('locations');
  setSyncing('ok');
  closeLocModal();
}

async function deleteLoc(id){setSyncing('syncing');await sb.from('locations').delete().eq('id',id);await reload('locations');setSyncing('ok');}


loadAll().then(()=>subscribeRealtime());
</script>
</body>
</html>
